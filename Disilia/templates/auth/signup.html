{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 p-8 glass-nav rounded-xl border border-gold/20 relative shadow-2xl">
    <div class="absolute inset-0 bg-gradient-to-bl from-gold/10 to-transparent rounded-xl pointer-events-none"></div>
    <div class="relative z-10">
        <h2 class="text-3xl font-light text-charcoal mb-6 uppercase tracking-widest text-center">Join Disilia</h2>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="first_name" class="block text-sm font-medium text-muted mb-2">First Name</label>
                    <input type="text" id="first_name" name="first_name" class="w-full bg-parchment border border-gray-700 rounded p-3 text-charcoal focus:outline-none focus:border-gold transition-colors" required>
                </div>
                <div>
                    <label for="last_name" class="block text-sm font-medium text-muted mb-2">Last Name</label>
                    <input type="text" id="last_name" name="last_name" class="w-full bg-parchment border border-gray-700 rounded p-3 text-charcoal focus:outline-none focus:border-gold transition-colors" required>
                </div>
            </div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-muted mb-2">Email Address</label>
                <input type="email" id="email" name="email" class="w-full bg-parchment border border-gray-700 rounded p-3 text-charcoal focus:outline-none focus:border-gold transition-colors" required>
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-muted mb-2">Password</label>
                <input type="password" id="password" name="password" class="w-full bg-parchment border border-gray-700 rounded p-3 text-charcoal focus:outline-none focus:border-gold transition-colors" required>
            </div>
            
            <div>
                <label for="password_confirm" class="block text-sm font-medium text-muted mb-2">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" class="w-full bg-parchment border border-gray-700 rounded p-3 text-charcoal focus:outline-none focus:border-gold transition-colors" required>
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded shadow-sm text-sm font-medium text-charcoal bg-gold hover:bg-yellow-500 transition-colors uppercase tracking-widest">
                Create Account
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm text-muted">
            Already have an account? 
            <a href="{% url 'users:login' %}" class="font-medium text-gold hover:text-yellow-400">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
