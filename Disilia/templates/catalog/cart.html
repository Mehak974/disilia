{% extends 'base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-16 pt-10 pb-24">
    <h1 class="text-4xl font-light text-charcoal mb-10 uppercase tracking-widest border-b border-gold/20 pb-4">Your Cart</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <!-- Cart Items -->
        <div class="lg:col-span-2">
            <!-- Simulated Empty Cart Block based on Django session logic -->
            <div class="glass-nav border border-gold/20 rounded p-12 text-center">
                <div class="text-6xl mb-6 opacity-30">🛒</div>
                <h3 class="text-xl text-charcoal mb-4">Your cart is currently empty.</h3>
                <p class="text-muted mb-8">Before proceed to checkout you must add some products to your shopping cart.</p>
                <a href="{% url 'store:catalog_all' %}" class="inline-block px-8 py-3 bg-gold text-charcoal uppercase tracking-widest font-semibold hover:bg-yellow-500 transition-colors rounded">Return to Shop</a>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="lg:col-span-1">
            <div class="glass-nav border border-gold/20 rounded p-8 sticky top-28">
                <h2 class="text-xl font-semibold text-charcoal mb-6 uppercase tracking-wider border-b border-gold/20 pb-4">Order Summary</h2>
                
                <div class="space-y-4 mb-6 text-gray-300">
                    <div class="flex justify-between">
                        <span>Subtotal</span>
                        <span>$0.00</span>
                    </div>
                    <div class="flex justify-between text-sm text-muted">
                        <span>Estimated Shipping</span>
                        <span>Calculated at checkout</span>
                    </div>
                </div>
                
                <div class="border-t border-gold/20 pt-6 mb-8 flex justify-between items-center text-xl">
                    <span class="font-light text-charcoal">Total</span>
                    <span class="font-medium text-gold">$0.00</span>
                </div>
                
                <button disabled class="w-full bg-gray-800 text-muted uppercase tracking-widest font-semibold py-4 rounded cursor-not-allowed">
                    Checkout
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
